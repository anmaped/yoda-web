server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    location = /main.bc.js {
        add_header Cache-Control "no-store" always;
    }
}