name: Build Static Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
          dune-cache: true

      - name: Install dependencies
        run: opam install ./yoda-web.opam --deps-only --with-test

      - name: Build JavaScript bundle
        run: opam exec -- dune build src/main.bc.js --profile release

      - name: Assemble static package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -a static dist/static
          rm -rf dist/static/_old
          cp _build/default/src/main.bc.js dist/static/main.bc.js

      - name: Upload static directory
        uses: actions/upload-artifact@v4
        with:
          name: yoda-web-static
          path: dist/static
