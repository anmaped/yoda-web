name: Build Container Image

on:
  workflow_run:
    workflows:
      - Build Static Package
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Build Static Package run ID to use as the artifact source
        required: true
        type: string

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  build-image:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository for workflow run
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout repository for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Resolve artifact source
        id: artifact
        shell: bash
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          if [ -n "${WORKFLOW_RUN_ID:-}" ]; then
            echo "run_id=${WORKFLOW_RUN_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: yoda-web-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.artifact.outputs.run_id }}
          path: dist/static

      - name: Prepare container build context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p image-context
          cp Containerfile image-context/Containerfile
          mkdir -p image-context/nginx
          cp default.conf image-context/nginx/default.conf
          cp -a dist/static image-context/static

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.event != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derive image tags
        id: tags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_EVENT: ${{ github.event.workflow_run.event }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short_sha="${SHA:0:7}"
          if [ "$EVENT_NAME" = "workflow_run" ] && [ -n "${HEAD_SHA:-}" ]; then
            short_sha="${HEAD_SHA:0:7}"
          fi

          tags="${{ steps.image.outputs.image }}:sha-${short_sha}"

          if [ "$EVENT_NAME" = "workflow_run" ] && [ "$HEAD_EVENT" = "push" ] && [ -n "${HEAD_BRANCH:-}" ]; then
            branch_tag="$(printf '%s' "$HEAD_BRANCH" | tr '/[:upper:]' '-[:lower:]')"
            tags="$(printf '%s\n%s' "$tags" "${{ steps.image.outputs.image }}:${branch_tag}")"
            if [ "$HEAD_BRANCH" = "main" ]; then
              tags="$(printf '%s\n%s' "$tags" "${{ steps.image.outputs.image }}:latest")"
            fi
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${REF_NAME:-}" ]; then
            ref_tag="$(printf '%s' "$REF_NAME" | tr '/[:upper:]' '-[:lower:]')"
            tags="$(printf '%s\n%s' "$tags" "${{ steps.image.outputs.image }}:${ref_tag}")"
          fi

          printf 'tags<<EOF\n%s\nEOF\n' "$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: image-context
          file: image-context/Containerfile
          push: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max